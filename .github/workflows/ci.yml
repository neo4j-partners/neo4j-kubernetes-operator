name: CI

on:
  push:
    branches: [main, test_automation]
  pull_request:
    branches: [main, test_automation]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Install controller-gen
        run: make controller-gen

      - name: Unit tests
        run: make test

      - name: Audit (CRD + reconcile lint)
        run: make audit

  e2e-local-kind:
    name: E2E — kind
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: docker/setup-buildx-action@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Prepare scripts
        run: find tests -name '*.sh' -exec chmod +x {} +

      - name: Create kind cluster and load operator image
        run: bash tests/bin/setup-local-kind.sh

      # One step per suite so each scenario shows its own pass/fail in the job view.
      # `!cancelled()` lets every scenario run (and report) even if a previous one failed.
      - name: "Scenario: p0-standalone"
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p0-standalone

      - name: "Scenario: neo4j-admission"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh neo4j-admission

      # Boots Neo4j and probes connectors (bolt/neo4j/http succeed, https fails without TLS)
      # from the Neo4j pod and from a separate client pod.
      - name: "Scenario: p1-connectivity"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p1-connectivity

      # spec.config passthrough (AC-NEO-CONFIG-001) + invalid-setting startup error (AC-NEO-CONFIG-002).
      - name: "Scenario: p2-serverconfig"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p2-serverconfig

      # Generated password vs referenced Secret, each verified with a real bolt query.
      - name: "Scenario: p3-credentials"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p3-credentials

      # Data modes (Dynamic/StorageClass, claimName, volumeClaimTemplate, emptyDir),
      # Share logs/metrics + additionalMounts mount checks, and invalid-storage failures.
      - name: "Scenario: p4-storage"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p4-storage

      # Deleting the CR preserves the data PVC by default (NEO-2-018).
      - name: "Scenario: p5-uninstall"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p5-uninstall

      # Namespace-scoped operator ignores CRs outside WATCH_NAMESPACE (OP-2-001-SCOPE-01).
      - name: "Scenario: p6-scope"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p6-scope

      # spec.config change is applied via a controlled restart (NEO-2-010).
      - name: "Scenario: p7-config-change"
        if: ${{ !cancelled() }}
        run: CLOUD=local-kind ./tests/bin/run-e2e.sh p7-config-change

      - name: Upload e2e results (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-results-local-kind-${{ github.run_id }}
          path: tests/results/
          if-no-files-found: warn
          retention-days: 14

