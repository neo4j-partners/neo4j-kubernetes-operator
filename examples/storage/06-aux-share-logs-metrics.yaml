# Purpose: Dynamic data + logs/metrics Share from data (subPathExpr logs|metrics/$(POD_NAME)).
# Prerequisites: none.
# Apply: kubectl apply -f examples/storage/06-aux-share-logs-metrics.yaml
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-storage-share
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
      logs:
        mode: Share
        shareFrom: data
      metrics:
        mode: Share
        shareFrom: data
  auth:
    generatePassword: true
