# Purpose: Dynamic data + additionalMounts emptyDir at /extra-data.
# Prerequisites: none.
# Apply: kubectl apply -f examples/storage/09-additional-mounts.yaml
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-storage-additional
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
    additionalMounts:
      - name: extra-data
        mountPath: /extra-data
        volume:
          name: extra-data
          emptyDir: {}
  auth:
    generatePassword: true
