# Purpose: Dynamic data + secretMounts projecting an Opaque Secret into the Neo4j container.
# Prerequisites: apply companion Secret first —
#   kubectl apply -f examples/storage/10-secret-mounts-secret.yaml
# Apply: kubectl apply -f examples/storage/10-secret-mounts.yaml
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-storage-secret
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
    secretMounts:
      creds:
        secretName: dev-storage-secret-creds
        mountPath: /var/secrets/creds
        items:
          - key: config.txt
            path: config.txt
  auth:
    generatePassword: true
