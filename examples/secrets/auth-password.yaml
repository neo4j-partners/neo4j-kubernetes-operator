# Purpose: Bootstrap Neo4j auth Secret consumed via spec.auth.passwordSecretRef.name.
# Prerequisites: none — this Secret is itself a prerequisite for other examples.
# Apply: kubectl apply -f examples/secrets/auth-password.yaml
# Related README: ../README.md#tls--auth--plugin-prerequisites (see also examples/secrets/README.md)
#
# Used by: examples/standalone/02-auth-existing-secret.yaml
#
# The operator reads the exact key "NEO4J_AUTH" in the form "<user>/<password>".
# Change the password before using this outside a local/dev namespace.
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-auth
type: Opaque
stringData:
  NEO4J_AUTH: neo4j/ChangeMe123!
