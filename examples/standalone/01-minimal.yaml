# Purpose: Smallest valid Standalone Neo4j CR — good default for local/dev (works on kind).
# Prerequisites: none.
# Apply: kubectl apply -f examples/standalone/01-minimal.yaml
# Related README: ../README.md#standalone
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-minimal
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
  auth:
    generatePassword: true
