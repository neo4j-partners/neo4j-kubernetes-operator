# Purpose: Bolt-only TLS — encrypts driver traffic; Browser stays on plain HTTP (no https listener).
# Prerequisites:
#   ./hack/gen-cluster-tls.sh default dev-tls-bolt 1
#   (creates Secrets dev-tls-bolt-cluster-key / -cert / -ca in namespace "default")
# Apply: kubectl apply -f examples/standalone/08-tls-bolt-only.yaml
# Related README: ../README.md#tls--auth--plugin-prerequisites
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-tls-bolt
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
  auth:
    generatePassword: true
  trust:
    enabled: true
    certificates:
      bolt:
        privateKey:
          secretName: dev-tls-bolt-cluster-key
          subPath: private.key
        publicCertificate:
          secretName: dev-tls-bolt-cluster-cert
          subPath: public.crt
        clientAuth: None
