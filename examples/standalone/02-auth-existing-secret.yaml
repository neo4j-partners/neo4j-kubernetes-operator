# Purpose: Use a pre-created auth Secret instead of an operator-generated password.
# Prerequisites: apply examples/secrets/auth-password.yaml first (creates Secret "neo4j-auth").
# Apply:
#   kubectl apply -f examples/secrets/auth-password.yaml
#   kubectl apply -f examples/standalone/02-auth-existing-secret.yaml
# Related README: ../README.md#standalone
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-auth-secret
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
  auth:
    passwordSecretRef:
      name: neo4j-auth
