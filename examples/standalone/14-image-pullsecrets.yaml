# Purpose: Pin the image repository/pull policy and reference a private-registry pull Secret.
# Prerequisites: create "my-registry-secret" (docker-registry type) in the target namespace:
#   kubectl create secret docker-registry my-registry-secret \
#     --docker-server=<registry> --docker-username=<user> --docker-password=<pass>
# Apply: kubectl apply -f examples/standalone/14-image-pullsecrets.yaml
# Related README: ../README.md#standalone
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: dev-pullsecrets
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 10Gi
  auth:
    generatePassword: true
  image:
    repository: neo4j
    pullPolicy: IfNotPresent
    pullSecrets: [my-registry-secret]
