apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: community
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Cluster
    primaries:
      members: 1
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: __DATA_SIZE__
          storageClassName: __STORAGE_CLASS__
  auth:
    generatePassword: true
