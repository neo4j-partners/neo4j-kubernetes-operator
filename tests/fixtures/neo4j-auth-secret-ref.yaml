apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: __DATA_SIZE__
          storageClassName: __STORAGE_CLASS__
  # Use a pre-created auth Secret (key NEO4J_AUTH=neo4j/<password>) instead of a
  # generated one. The harness creates 'neo4j-auth' before applying this CR.
  auth:
    passwordSecretRef:
      name: neo4j-auth
