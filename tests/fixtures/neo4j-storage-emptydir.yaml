apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Existing
        existing:
          # Inline emptyDir data volume (lab only, non-persistent). No PVC is created;
          # StorageReady is satisfied immediately and the pod boots off ephemeral storage.
          volume:
            name: data
            emptyDir: {}
  auth:
    generatePassword: true
