apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Existing
        existing:
          # Raw StatefulSet volumeClaimTemplate — the operator provisions the PVC
          # (data-<cr>-server-0) from this spec using the default StorageClass.
          volumeClaimTemplate:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
  auth:
    generatePassword: true
