apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: __DATA_SIZE__
          storageClassName: __STORAGE_CLASS__
  auth:
    generatePassword: true
  # Valid, overridable neo4j.conf setting — must be rendered verbatim into <cr>-config.
  config:
    neo4j:
      db.transaction.timeout: "42s"
