apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 1Gi
          # StorageClass that does not exist: admission passes (any string is valid),
          # but the PVC stays Pending forever and the CR never becomes Ready.
          storageClassName: no-such-storage-class
  auth:
    generatePassword: true
