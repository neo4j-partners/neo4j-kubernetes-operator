apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: __CR_NAME__
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Standalone
  storage:
    volumes:
      data:
        mode: Dynamic
        dynamic:
          size: 1Gi
          # kind's default StorageClass (rancher.io/local-path). Binds once the pod
          # schedules (WaitForFirstConsumer), so the CR reaches Ready.
          storageClassName: standard
  auth:
    generatePassword: true
