name: p1-connectivity
description: Deploy Standalone Neo4j (no TLS) and probe connectors from the pod and a client pod
brief_ref: slice-1-connectivity
use_pipeline: standalone-suite
on_case_failure: stop

# case_assert order: wait for a running Neo4j, then probe from the pod itself,
# then from a separate client pod through the client Service.
pipeline:
  case_assert:
    - assert/standalone-ready
    - assert/connectivity
    - assert/connectivity-external

cases:
  - id: no-tls
    neo4j_case: standalone-connectivity
    assert: standalone-ready
    expect: success
