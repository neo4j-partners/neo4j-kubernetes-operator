name: p3-credentials
description: Bootstrap credentials — generated password vs referenced Secret, verified over bolt
brief_ref: neo4j-credentials
use_pipeline: credentials-suite
on_case_failure: continue
clouds: [local-kind]

pipeline:
  case_assert:
    - assert/credentials

cases:
  # Operator generates the password (<cr>-auth) and it authenticates a bolt query.
  - id: generated
    neo4j_case: standalone-auth-generated
    fixture: tests/fixtures/neo4j-standalone.yaml
    assert: credentials
    expect: success
    cr_name: dev-gen

  # Operator uses a pre-created Secret; that exact password authenticates a bolt query.
  - id: secret-ref
    neo4j_case: standalone-auth-secretref
    fixture: tests/fixtures/neo4j-auth-secret-ref.yaml
    assert: credentials
    expect: success
    cr_name: dev-secref
