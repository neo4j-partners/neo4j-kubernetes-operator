# HA cluster + read scaling + GDS/Bloom analytics (BDR-002 + BDR-004 Option E)
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: prod
  namespace: graph-prod
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Cluster
    primaries:
      members: 3
      plugins: [apoc]
    secondaries:
      - name: read-scale
        members: 2
        plugins: [apoc]
      - name: analytics
        members: 1
        plugins: [gds, bloom]
    minimumMembers: 3
  pluginDefinitions:
    apoc: {}
    gds:
      licenseSecretRef: gds-license
    bloom:
      licenseSecretRef: bloom-license
  persistence:
    data:
      size: 100Gi
