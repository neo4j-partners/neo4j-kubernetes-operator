# Production HA cluster with secondaries (BDR-002 + BDR-004)
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: prod
  namespace: graph-prod
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Cluster
    primaries:
      members: 3
    secondaries:
      members: 2
    minimumMembers: 3
  plugins:
    primaries: [apoc]
    secondaries: [apoc]
  pluginDefinitions:
    apoc: {}
  persistence:
    data:
      size: 100Gi
