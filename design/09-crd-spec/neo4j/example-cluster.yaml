# Primary + analytics (GDS/Bloom) + read scaling (BDR-002 + BDR-004 Option E)
apiVersion: neo4j.com/v1beta1
kind: Neo4j
metadata:
  name: prod
  namespace: graph-prod
spec:
  edition: enterprise
  version: "2026.05.0"
  license:
    accept: "yes"
  topology:
    mode: Cluster
    primaries:
      members: 1
      plugins: [apoc]
    secondaries:
      analytics:
        members: 1
        plugins: [gds, bloom]
      read:
        members: 1
        plugins: [apoc]
    minimumMembers: 1
  pluginDefinitions:
    apoc: {}
    gds:
      licenseSecretRef: gds-license
    bloom:
      licenseSecretRef: bloom-license
  persistence:
    data:
      size: 100Gi
