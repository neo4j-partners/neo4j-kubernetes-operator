apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-operator-controller-manager
  namespace: neo4j-operator-system
  labels:
    app.kubernetes.io/name: neo4j-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j-operator
    spec:
      serviceAccountName: neo4j-operator-controller-manager
      securityContext:
        runAsNonRoot: true
      containers:
      - name: manager
        image: "neo4joperatoracr.azurecr.io/neo4j-operator:latest"
        imagePullPolicy: Always
        command:
        - /manager
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        ports:
        - containerPort: 8081
          name: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
