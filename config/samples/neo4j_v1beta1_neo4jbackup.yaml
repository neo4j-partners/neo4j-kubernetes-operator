apiVersion: neo4j.neo4j.com/v1beta1
kind: Neo4jBackup
metadata:
  name: example-backup
spec:
  # instanceRef + allDatabases backs up every database on the named deployment
  instanceRef: sample-cluster  # References your Neo4jEnterpriseCluster/Standalone name
  allDatabases: true
  storage:
    type: pvc
    pvc:
      name: neo4j-backup-pvc
      storageClassName: standard
      size: 20Gi
  options:
    compress: true
    backupType: FULL  # FULL | DIFF | AUTO
